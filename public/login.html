<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimplifyAI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-K1C84W8TYS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-K1C84W8TYS');

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Poppins", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .logo {
      font-size: 24px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 2rem;
      text-align: center;
    }

    .logo span { color: #818cf8; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .card h2 {
      font-size: 20px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 1.75rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #131520;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #6366f1; }
    input::placeholder { color: #3d4466; }

    .btn {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: "Poppins", sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #2d3148; color: #475569; cursor: not-allowed; }

    .error-box {
      display: none;
      background: #2d1515;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 1rem;
      line-height: 1.6;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: #64748b;
    }

    .footer-link a {
      color: #818cf8;
      text-decoration: none;
    }

    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo">Simplify<span>AI</span></div>

  <div class="card">
    <h2>Welcome back</h2>
    <p>Log in to your SimplifyAI account.</p>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" />
    </div>

    <button class="btn" id="login-btn" onclick="logIn()">
      Log In
    </button>

    <div class="error-box" id="error-box"></div>

    <div class="footer-link">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>

  

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://xbdqrzeblcxdtdiezhnd.supabase.co',
       'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZHFyemVibGN4ZHRkaWV6aG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTA2OTMsImV4cCI6MjA5NjMyNjY5M30.2DghSB0JbSYJ-3S03FIj1uCDOOpjU9pdn4VJmk2iB58'
    );

    async function logIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorBox = document.getElementById('error-box');
      const btn = document.getElementById('login-btn');

      errorBox.style.display = 'none';

      if (!email || !password) {
        errorBox.textContent = 'Please fill in all fields.';
        errorBox.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errorBox.textContent = error.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log In';
      } else {
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
